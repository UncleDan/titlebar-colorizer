<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TitleBar Colorizer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --accent: #7c6eff;
      --accent2: #ff6e9c;
      --text: #e8e8f0;
      --muted: #888899;
      --radius: 10px;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      padding: 20px;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 span {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 1px;
    }

    /* ── PREVIEW BAR ── */
    .preview-bar {
      border-radius: var(--radius) var(--radius) 0 0;
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      transition: background 0.3s, color 0.3s;
      border: 1px solid var(--border);
      border-bottom: none;
    }

    .traffic-light {
      display: flex;
      gap: 5px;
    }
    .tl { width: 9px; height: 9px; border-radius: 50%; opacity: 0.8; }
    .tl-r { background: #ff5f57; }
    .tl-y { background: #febc2e; }
    .tl-g { background: #28c840; }

    .preview-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      opacity: 0.9;
      margin-left: 4px;
      letter-spacing: 0.04em;
    }

    .preview-tab-bar {
      border-radius: 0;
      height: 32px;
      display: flex;
      align-items: flex-end;
      padding: 0 12px;
      gap: 4px;
      transition: background 0.3s;
      border: 1px solid var(--border);
      border-top: none;
      border-bottom: none;
    }

    .preview-tab {
      height: 26px;
      padding: 0 12px;
      border-radius: 6px 6px 0 0;
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      transition: background 0.3s, color 0.3s;
    }

    .preview-toolbar {
      height: 36px;
      border-radius: 0 0 var(--radius) var(--radius);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      margin-bottom: 18px;
      transition: background 0.3s;
    }

    .toolbar-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      opacity: 0.5;
    }

    .toolbar-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      opacity: 0.3;
    }

    /* ── PICKER ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    input[type="color"] {
      width: 44px;
      height: 44px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: none;
      cursor: pointer;
      padding: 2px;
      transition: border-color 0.2s;
    }
    input[type="color"]:hover { border-color: var(--accent); }

    .hex-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      letter-spacing: 0.08em;
      outline: none;
      transition: border-color 0.2s;
    }
    .hex-input:focus { border-color: var(--accent); }

    /* ── INFO BADGE ── */
    .contrast-info {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      font-size: 11px;
      color: var(--muted);
    }

    .contrast-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .contrast-info strong {
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    /* ── PRESETS ── */
    .presets-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-bottom: 18px;
    }

    .preset {
      aspect-ratio: 1;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }
    .preset:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.3); }
    .preset.active { border-color: white; }

    /* ── SCALA AUTOMATICA ── */
    .scale-row {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
    }

    .scale-swatch {
      flex: 1;
      height: 28px;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.15s, outline 0.15s;
      outline: 2px solid transparent;
      outline-offset: 2px;
    }
    .scale-swatch:hover { transform: scaleY(1.15); outline-color: rgba(255,255,255,0.4); }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>

  <header>
    <div class="logo">🎨</div>
    <h1>TitleBar Colorizer <span>LibreWolf / Firefox</span></h1>
  </header>

  <!-- PREVIEW -->
  <div class="preview-bar" id="previewBar">
    <div class="traffic-light">
      <div class="tl tl-r"></div>
      <div class="tl tl-y"></div>
      <div class="tl tl-g"></div>
    </div>
    <span class="preview-title" id="previewTitle">LibreWolf — Anteprima</span>
  </div>
  <div class="preview-tab-bar" id="previewTabBar">
    <div class="preview-tab" id="previewTab">Scheda attiva</div>
  </div>
  <div class="preview-toolbar" id="previewToolbar">
    <div class="toolbar-dot" id="toolbarDot"></div>
    <div class="toolbar-bar" id="toolbarBar"></div>
    <div class="toolbar-dot" id="toolbarDot2"></div>
  </div>

  <!-- SELEZIONE COLORE -->
  <div class="section-label">Scegli colore</div>
  <div class="color-row">
    <input type="color" id="colorPicker" value="#1e2a3a" />
    <input type="text" class="hex-input" id="hexInput" value="#1e2a3a" maxlength="7" placeholder="#rrggbb" />
  </div>

  <!-- INFO CONTRASTO -->
  <div class="contrast-info">
    <div class="contrast-dot" id="contrastDot"></div>
    <span>Testo: <strong id="textColorLabel">#ffffff</strong> — Contrasto: <strong id="contrastRatio">—</strong></span>
  </div>

  <!-- PRESET COLORI -->
  <div class="section-label">Preset</div>
  <div class="presets-grid" id="presetsGrid"></div>

  <!-- SCALA AUTOMATICA -->
  <div class="section-label">Scala tonale automatica</div>
  <div class="scale-row" id="scaleRow"></div>

  <!-- AZIONI -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btnApply">✓ Applica</button>
    <button class="btn btn-secondary" id="btnReset">↺ Ripristina</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
